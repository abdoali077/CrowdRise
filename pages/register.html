<html lang="en">

                <div class="form-group">

                    </div>
                </div>

                <div class="form-group">
                    <label for="user-password">Password</label>

                    </div>
                </div>

                <div class="form-options">

                </div>

                <button type="submit" class="auth-btn" id="submit-register">
