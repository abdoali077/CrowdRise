<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CrowdRise</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../CssFile/login.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-container">
            <form class="auth-form" id="login-form">
                <div class="form-header">
                    <i class="fa-solid fa-circle-user" id="user-avatar-icon"></i>
                    <h2 id="login-title">Welcome Back</h2>
                    <p>Login to manage your campaigns</p>
                </div>

                <div class="form-group">
                    <label for="user-email">Email Address</label>
                    <div class="input-with-icon">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="user-email" placeholder="name@example.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="user-password">Password</label>
                    <div class="input-with-icon">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="user-password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="form-options">
                    <label><input type="checkbox"> Remember me</label>
                </div>

                <button type="submit" class="auth-btn" id="submit-login">
                    <span>Login</span> <i class="fa-solid fa-arrow-right"></i>
                </button>

                <p class="auth-switch">
                    Don't have an account? 
                    <a href="register.html" id="to-register">Register Now</a>
                </p>
            </form>
        </div>
    </div>
</body>
</html>
